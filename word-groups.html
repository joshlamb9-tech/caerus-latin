<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CE Latin English-to-Latin word groupings — organised by declension and conjugation for Q4 revision">
  <meta name="theme-color" content="#1a2744">
  <title>Word Groups &mdash; Caerus Latin</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .wg-intro {
      font-style: italic;
      color: var(--color-stone-light);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .wg-group {
      margin-bottom: 2.5rem;
    }
    .wg-group-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--color-terracotta);
      margin-bottom: 0.25rem;
    }
    .wg-group-note {
      font-size: 0.85rem;
      color: var(--color-stone-light);
      font-style: italic;
      margin-bottom: 0.75rem;
    }
    .wg-table {
      width: 100%;
      border-collapse: collapse;
    }
    .wg-table tr {
      border-bottom: 1px solid var(--color-border);
    }
    .wg-table tr:last-child {
      border-bottom: none;
    }
    .wg-table td {
      padding: 0.4rem 0.75rem;
      font-size: 1rem;
    }
    .wg-table td:first-child {
      color: var(--color-stone-light);
      width: 45%;
    }
    .wg-table td:last-child {
      font-weight: 700;
      color: var(--color-stone);
    }
    .wg-table tr:hover td {
      background-color: var(--color-parchment-dark);
    }
    /* Support toggle */
    .wg-mode-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .wg-mode-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--color-stone-light);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-right: 0.25rem;
    }
    .wg-mode-toggle {
      display: flex;
      border: 1.5px solid var(--color-border);
      border-radius: 6px;
      overflow: hidden;
    }
    .wg-mode-btn {
      padding: 0.4rem 1rem;
      font-family: 'EB Garamond', serif;
      font-size: 0.9rem;
      font-weight: 700;
      background: transparent;
      color: var(--color-stone-light);
      border: none;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .wg-mode-btn:first-child { border-right: 1.5px solid var(--color-border); }
    .wg-mode-btn.active {
      background: var(--color-terracotta);
      color: #fff;
    }
    /* Hide Latin column in test mode */
    .wg-mode-test .wg-table td:last-child {
      color: transparent;
      user-select: none;
      border-left: 2px dashed var(--color-border);
    }
    .wg-mode-test .wg-table tr:hover td:last-child {
      color: var(--color-stone);
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-title">Caerus Latin</a>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span class="hamburger-bar"></span>
        <span class="hamburger-bar"></span>
        <span class="hamburger-bar"></span>
      </button>
      <nav class="site-nav" id="site-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="vocabulary.html">Vocabulary</a></li>
          <li><a href="grammar.html">Grammar</a></li>
          <li><a href="quiz.html">Exercises</a></li>
          <li><a href="papers.html">Past Papers</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main id="app">
    <h1>Q4 Word Groups</h1>
    <p class="wg-intro">English to Latin &mdash; organised by noun group and verb conjugation.</p>
    <div class="wg-mode-bar">
      <span class="wg-mode-label">Mode:</span>
      <div class="wg-mode-toggle">
        <button class="wg-mode-btn active" id="btn-study">Study</button>
        <button class="wg-mode-btn" id="btn-test">Test (hover to reveal)</button>
      </div>
    </div>
    <div id="groups-container"><p>Loading&hellip;</p></div>
  </main>
  <footer class="site-footer">
    <p>Caerus Latin &middot; <a href="https://caerusrevision.co.uk">caerusrevision.co.uk</a> &middot; Content sourced from ISEB syllabus and Bob Bass materials (used with permission)</p>
  </footer>
  <script src="js/app.js"></script>
  <script>
    fetch('data/vocabulary/word-groups.json')
      .then(r => r.json())
      .then(groups => {
        const container = document.getElementById('groups-container');
        container.innerHTML = '';
        groups.forEach(group => {
          const section = document.createElement('div');
          section.className = 'wg-group';

          const title = document.createElement('div');
          title.className = 'wg-group-title';
          title.textContent = group.label;
          section.appendChild(title);

          if (group.note) {
            const note = document.createElement('div');
            note.className = 'wg-group-note';
            note.textContent = group.note;
            section.appendChild(note);
          }

          const table = document.createElement('table');
          table.className = 'wg-table';
          group.words.forEach(word => {
            const row = document.createElement('tr');
            const engCell = document.createElement('td');
            engCell.textContent = word.english;
            const latCell = document.createElement('td');
            latCell.textContent = word.latin;
            row.appendChild(engCell);
            row.appendChild(latCell);
            table.appendChild(row);
          });
          section.appendChild(table);
          container.appendChild(section);
        });
      })
      .catch(() => {
        document.getElementById('groups-container').innerHTML = '<p class="error">Could not load word groups.</p>';
      });

    // Support / Test mode toggle
    var main = document.getElementById('app');
    document.getElementById('btn-study').addEventListener('click', function () {
      main.classList.remove('wg-mode-test');
      this.classList.add('active');
      document.getElementById('btn-test').classList.remove('active');
    });
    document.getElementById('btn-test').addEventListener('click', function () {
      main.classList.add('wg-mode-test');
      this.classList.add('active');
      document.getElementById('btn-study').classList.remove('active');
    });
  </script>
</body>
</html>
