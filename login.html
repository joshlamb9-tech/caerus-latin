<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Sign In — Caerus Latin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens ── */
    :root {
      --navy:   #1a2744;
      --navy-d: #0f1729;
      --gold:   #c9a84c;
      --gold-l: #e2c57a;
      --cream:  #faf8f3;
      --cream-d:#f0ede4;
      --ink:    #1a2744;
      --muted:  #6b7280;
      --error:  #d63031;
      --font-b: 'EB Garamond', Georgia, serif;
      --font-d: 'Playfair Display', Georgia, serif;
    }

    /* ── Base ── */
    html, body { min-height: 100vh; }

    body {
      background: var(--navy);
      color: var(--cream);
      font-family: var(--font-b);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    /* ── Page layout ── */
    .page-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    /* ── Wordmark ── */
    .wordmark {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
      text-decoration: none;
    }

    .wordmark-text {
      font-family: var(--font-d);
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    .wordmark-sub {
      font-family: var(--font-b);
      font-size: 0.85rem;
      color: rgba(250,248,243,0.55);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .divider {
      width: 1px;
      height: 32px;
      background: var(--gold);
      opacity: 0.4;
    }

    /* ── Card ── */
    .card {
      background: var(--cream);
      color: var(--ink);
      border-radius: 4px;
      width: 100%;
      max-width: 460px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.35);
    }

    .card-header {
      background: var(--navy-d);
      padding: 1.5rem 2rem;
      border-bottom: 2px solid var(--gold);
    }

    .card-header h1 {
      font-family: var(--font-d);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--cream);
      line-height: 1.2;
    }

    .card-header p {
      font-size: 0.9rem;
      color: rgba(250,248,243,0.65);
      margin-top: 0.35rem;
      font-family: var(--font-b);
    }


    .card-body {
      padding: 2rem;
    }

    /* ── Tabs ── */
    .tab-row {
      display: flex;
      gap: 0;
      margin-bottom: 1.75rem;
      border-bottom: 2px solid var(--cream-d);
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 0.6rem 1rem;
      font-family: var(--font-b);
      font-size: 0.95rem;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn.active {
      color: var(--navy);
      border-bottom-color: var(--gold);
      font-weight: 600;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.7rem 0.85rem;
      border: 1.5px solid #d1d5db;
      border-radius: 3px;
      font-family: var(--font-b);
      font-size: 1rem;
      color: var(--ink);
      background: #fff;
      transition: border-color 0.15s;
      outline: none;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--gold);
    }

    /* ── Button ── */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 0.85rem;
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 3px;
      font-family: var(--font-d);
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .btn-primary:hover { background: var(--gold-l); }
    .btn-primary:active { transform: scale(0.99); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* ── Message ── */
    .msg {
      padding: 0.65rem 0.9rem;
      border-radius: 3px;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .msg-error {
      background: #fff0f0;
      color: var(--error);
      border-left: 3px solid var(--error);
    }

    .msg-success {
      background: #f0fff4;
      color: #166534;
      border-left: 3px solid #22c55e;
    }


    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #e5e7eb;
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Footer ── */
    .page-footer {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: rgba(250,248,243,0.35);
      text-align: center;
    }

    .page-footer a {
      color: rgba(201,168,76,0.6);
      text-decoration: none;
    }

    /* ── Hidden ── */
    .hidden { display: none !important; }

    /* ── Checking overlay ── */
    #checking {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: rgba(250,248,243,0.5);
      font-size: 0.9rem;
    }

    /* ── Mobile adjustments ── */
    @media (max-width: 480px) {
      .page-wrap {
        padding: 1.5rem 0.75rem 3rem;
      }

      .wordmark {
        margin-bottom: 1.5rem;
      }

      .card-header {
        padding: 1.25rem;
      }

      .card-header h1 {
        font-size: 1.25rem;
      }

      .card-body {
        padding: 1.25rem 1rem;
      }

      .tab-btn {
        font-size: 0.8rem;
        padding: 0.55rem 0.35rem;
        letter-spacing: -0.01em;
      }
    }
  </style>
</head>
<body>
<div class="page-wrap">

  <!-- Wordmark -->
  <a href="index.html" class="wordmark">
    <span class="wordmark-text">Caerus Latin</span>
    <span class="divider"></span>
    <span class="wordmark-sub">CE Preparation</span>
  </a>

  <!-- Checking auth state -->
  <div id="checking">
    <div class="spinner"></div>
    <span>Loading&hellip;</span>
  </div>

  <!-- ── View 1: Authentication ── -->
  <div id="view-auth" class="card hidden">
    <div class="card-header">
      <h1 id="auth-header-h1">Sign in to Caerus Latin</h1>
      <p id="auth-header-p">Vocabulary, grammar, and practice for ISEB Common Entrance &mdash; free.</p>
    </div>
    <div class="card-body">

      <div class="tab-row">
        <button class="tab-btn active" id="tab-signin" onclick="switchTab('signin')">Sign in</button>
        <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Create account</button>
      </div>

      <div id="msg-auth" class="msg hidden"></div>

      <!-- Sign in form -->
      <form id="form-signin" onsubmit="handleSignIn(event)">
        <div class="form-group">
          <label for="si-email">Email address</label>
          <input type="email" id="si-email" required placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="si-password">Password</label>
          <input type="password" id="si-password" required placeholder="Your password" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary" id="btn-signin">Sign in &rarr;</button>
      </form>

      <!-- Sign up form -->
      <form id="form-signup" class="hidden" onsubmit="handleSignUp(event)">
        <div class="form-group">
          <label for="su-email">Email address</label>
          <input type="email" id="su-email" required placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="su-password">Password</label>
          <input type="password" id="su-password" required placeholder="Choose a password (min 8 chars)" minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn-primary" id="btn-signup">Create account &rarr;</button>
      </form>

    </div>
  </div>

  <footer class="page-footer">
    <a href="https://caerusrevision.co.uk">caerusrevision.co.uk</a>
    &nbsp;&middot;&nbsp;
    <a href="index.html">Back to site</a>
  </footer>

</div>

<script>
  var SUPABASE_URL        = 'https://dlcseuejvducbsjhqvze.supabase.co';
  var SUPABASE_ANON       = 'sb_publishable_k_59EUPnHNnJ534tF0vMvQ_Ams9wV9L';

  var client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // Where to redirect after successful login
  var params     = new URLSearchParams(location.search);
  var nextPage   = params.get('next') || 'index.html';

  /* ─── Boot: check auth state ─── */
  // Safety net: if getSession hangs, show the auth form after 5s
  var authTimeout = setTimeout(function() { show('view-auth'); }, 5000);

  client.auth.getSession().then(function(result) {
    clearTimeout(authTimeout);
    var session = result.data.session;
    if (!session) {
      show('view-auth');
      return;
    }
    checkAccess(session.user, session.access_token);
  }).catch(function() {
    clearTimeout(authTimeout);
    show('view-auth');
  });

  function checkAccess(user, token) {
    // Paywall removed: any authenticated user gets full access.
    window.location.href = nextPage;
  }


  /* ─── Tab switching ─── */
  var headerCopy = {
    signin:  { h1: 'Sign in to Caerus Latin',   p: 'Access your vocabulary, grammar, exercises, and practice papers.' },
    signup:  { h1: 'Create your account',        p: 'Set up your free account to access Caerus Latin.' },
  };

  function switchTab(tab) {
    if (tab !== 'signin' && tab !== 'signup') { tab = 'signin'; }
    document.getElementById('form-signin').classList.toggle('hidden', tab !== 'signin');
    document.getElementById('form-signup').classList.toggle('hidden', tab !== 'signup');
    document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    var copy = headerCopy[tab];
    if (copy) {
      var h1 = document.getElementById('auth-header-h1');
      var p  = document.getElementById('auth-header-p');
      if (h1) h1.textContent = copy.h1;
      if (p)  p.textContent  = copy.p;
    }
    clearMsg();
  }

  /* ─── Sign In ─── */
  function handleSignIn(e) {
    e.preventDefault();
    var btn = document.getElementById('btn-signin');
    btn.disabled = true;
    btn.textContent = 'Signing in\u2026';
    clearMsg();

    var email    = document.getElementById('si-email').value.trim();
    var password = document.getElementById('si-password').value;

    client.auth.signInWithPassword({ email: email, password: password })
      .then(function(result) {
        btn.disabled = false;
        btn.textContent = 'Sign in \u2192';
        if (result.error) {
          showMsg(result.error.message, 'error');
          return;
        }
        checkAccess(result.data.user, result.data.session.access_token);
      });
  }

  /* ─── Sign Up ─── */
  function handleSignUp(e) {
    e.preventDefault();
    var btn = document.getElementById('btn-signup');
    btn.disabled = true;
    btn.textContent = 'Creating account\u2026';
    clearMsg();

    var email    = document.getElementById('su-email').value.trim();
    var password = document.getElementById('su-password').value;

    client.auth.signUp({ email: email, password: password })
      .then(function(result) {
        btn.disabled = false;
        btn.textContent = 'Create account \u2192';
        if (result.error) {
          showMsg(result.error.message, 'error');
          return;
        }
        // Check if email confirmation is required
        if (result.data.user && !result.data.session) {
          showMsg('Check your email to confirm your account, then sign in.', 'success');
          switchTab('signin');
          return;
        }
        checkAccess(result.data.user, result.data.session.access_token);
      });
  }

  /* ─── Helpers ─── */
  function show(id) {
    document.getElementById('checking').classList.add('hidden');
    ['view-auth'].forEach(function(v) {
      document.getElementById(v).classList.toggle('hidden', v !== id);
    });
  }

  function showMsg(text, type) {
    var el = document.getElementById('msg-auth');
    el.textContent = text;
    el.className = 'msg msg-' + type;
  }

  function clearMsg() {
    var el = document.getElementById('msg-auth');
    el.className = 'msg hidden';
  }
</script>
</body>
</html>
