<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GCSE Latin vocabulary — OCR J282 DVL drill with flashcards and speed recall">
  <meta name="theme-color" content="#1a2744">
  <title>Vocabulary &mdash; GCSE Latin &mdash; Caerus Latin</title>
  <link rel="manifest" href="../manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">

  <!-- Analytics -->
  <script>
    (function(){
      var SUPABASE_URL  = 'https://dlcseuejvducbsjhqvze.supabase.co';
      var SUPABASE_ANON = 'sb_publishable_k_59EUPnHNnJ534tF0vMvQ_Ams9wV9L';
      try {
        var sid = sessionStorage.getItem('cr_sid');
        if (!sid) { sid = Math.random().toString(36).slice(2); sessionStorage.setItem('cr_sid', sid); }
        var payload = JSON.stringify({ page: location.pathname.split('/').pop() || 'vocabulary.html', referrer: document.referrer || null, session_id: sid });
        fetch(SUPABASE_URL + '/rest/v1/page_views', { method:'POST', headers:{ 'Content-Type':'application/json', 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON, 'Prefer': 'return=minimal' }, body: payload, keepalive: true }).catch(function(){});
      } catch(e){}
    })();
  </script>

  <!-- Supabase client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- Auth guard: hide body until session + latin-gcse grant confirmed -->
  <style id="auth-guard">body { visibility: hidden !important; }</style>
  <script>
    (function () {
      var SUPABASE_URL  = 'https://dlcseuejvducbsjhqvze.supabase.co';
      var SUPABASE_ANON = 'sb_publishable_k_59EUPnHNnJ534tF0vMvQ_Ams9wV9L';
      var client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

      client.auth.getSession().then(function (result) {
        var session = result.data.session;
        if (!session) {
          window.location.href = '../login.html?next=' + encodeURIComponent('gcse/vocabulary.html');
          return;
        }

        client.from('access_grants')
          .select('id')
          .eq('user_id', session.user.id)
          .eq('product', 'latin-gcse')
          .gt('valid_until', new Date().toISOString())
          .limit(1)
          .then(function (gr) {
            if (!gr.data || gr.data.length === 0) {
              // No latin-gcse grant — redirect to GCSE landing (purchase/upgrade page)
              window.location.href = 'index.html';
              return;
            }

            // Grant confirmed — reveal page
            window.CR_AUTH = { client: client, userId: session.user.id };
            var guard = document.getElementById('auth-guard');
            if (guard) guard.remove();

            // Inject sign-out link into nav
            var nav = document.getElementById('site-nav');
            if (nav) {
              var ul = nav.querySelector('ul');
              if (ul) {
                var li = document.createElement('li');
                var a  = document.createElement('a');
                a.href = '#';
                a.textContent = 'Sign out';
                a.style.opacity = '0.65';
                a.addEventListener('click', function (e) {
                  e.preventDefault();
                  client.auth.signOut().then(function () { window.location.href = '../login.html'; });
                });
                li.appendChild(a);
                ul.appendChild(li);
              }
            }
          });
      });
    })();
  </script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="site-title">Caerus Latin</a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Open navigation" aria-expanded="false" aria-controls="site-nav">
        <span class="hamburger-bar"></span>
        <span class="hamburger-bar"></span>
        <span class="hamburger-bar"></span>
      </button>
      <nav class="site-nav" id="site-nav">
        <ul>
          <li><a href="../index.html">Home</a></li>
          <li><a href="../how-to-use.html">How to Use</a></li>
          <li class="nav-group">
            <a href="#" class="nav-group-toggle">Learn <svg class="nav-arrow" viewBox="0 0 10 6" width="10" height="6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 1l4 4 4-4"/></svg></a>
            <ul class="nav-group-menu">
              <li><a href="../vocabulary.html">CE Vocab</a></li>
              <li><a href="../grammar.html">CE Grammar</a></li>
            </ul>
          </li>
          <li class="nav-group">
            <a href="#" class="nav-group-toggle">Practise <svg class="nav-arrow" viewBox="0 0 10 6" width="10" height="6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 1l4 4 4-4"/></svg></a>
            <ul class="nav-group-menu">
              <li><a href="../quiz.html">CE Exercises</a></li>
              <li><a href="../speed-recall.html">Speed Recall</a></li>
            </ul>
          </li>
          <li><a href="index.html" class="nav-gcse-link">GCSE Latin <span class="nav-gcse-badge">GCSE</span></a></li>
          <li><a href="../account.html">Account</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div id="app">
      <!-- gcse/js/vocabulary.js renders content here -->
      <p style="text-align:center;padding:2rem;color:#666;">Loading vocabulary&hellip;</p>
    </div>
  </main>

  <script>
    // Nav toggle (hamburger)
    (function () {
      var toggle = document.getElementById('nav-toggle');
      var nav    = document.getElementById('site-nav');
      if (!toggle || !nav) return;
      toggle.addEventListener('click', function () {
        var isOpen = nav.classList.toggle('open');
        toggle.setAttribute('aria-expanded', String(isOpen));
      });
      nav.querySelectorAll('.nav-group-toggle').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          btn.parentElement.classList.toggle('open');
        });
      });
    })();
  </script>

  <script src="js/vocabulary.js"></script>
</body>
</html>
